<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alaya HLE - KPI Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        alaya: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .stage-badge-Pending { background-color: #ffedd5; color: #c2410c; border: 1px solid #fdba74; }
        .stage-badge-Approved { background-color: #e0f2fe; color: #0369a1; border: 1px solid #7dd3fc; }
        .stage-badge-PendingSettlement { background-color: #f3e8ff; color: #7e22ce; border: 1px solid #d8b4fe; }
        .stage-badge-Settlement { background-color: #dcfce3; color: #15803d; border: 1px solid #86efac; }
        
        .stage-border-Pending { border-left-color: #f97316; }
        .stage-border-Approved { border-left-color: #0ea5e9; }
        .stage-border-PendingSettlement { border-left-color: #a855f7; }
        .stage-border-Settlement { border-left-color: #22c55e; }
    </style>
</head>
<body class="text-slate-800 antialiased">

    <!-- Header -->
    <header class="bg-alaya-900 text-white shadow-md sticky top-0 z-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fa-solid fa-chart-line text-2xl text-alaya-500"></i>
                <h1 class="text-xl font-bold tracking-tight">Alaya HLE <span class="font-normal text-alaya-100">| Abhaya's KPI Tracker</span></h1>
            </div>
            <div class="text-sm font-medium text-alaya-100 flex items-center gap-4">
                <span id="currentDateDisplay" class="hidden sm:inline"></span>
                <button onclick="fetchFromGoogleSheet()" class="bg-alaya-600 hover:bg-alaya-500 px-3 py-1.5 rounded-md transition-colors text-xs font-semibold flex items-center gap-2">
                    <i id="sync-icon" class="fa-solid fa-rotate"></i> <span id="sync-text">Sync Data</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-6">
        
        <!-- KPI Summary Widgets -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100 flex flex-col justify-center">
                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Active Pipeline</p>
                <div class="flex items-end justify-between">
                    <h2 class="text-2xl font-bold text-slate-800" id="kpi-active">0</h2>
                    <i class="fa-solid fa-folder-open text-alaya-500 opacity-50 mb-1"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100 flex flex-col justify-center">
                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Settled Files</p>
                <div class="flex items-end justify-between">
                    <h2 class="text-2xl font-bold text-green-600" id="kpi-settled">0</h2>
                    <i class="fa-solid fa-check-circle text-green-500 opacity-50 mb-1"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100 flex flex-col justify-center">
                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Pipeline Value</p>
                <div class="flex items-end justify-between">
                    <h2 class="text-xl sm:text-2xl font-bold text-slate-800 truncate" id="kpi-value">$0</h2>
                    <i class="fa-solid fa-dollar-sign text-alaya-500 opacity-50 mb-1 ml-2"></i>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-4 border border-slate-100 flex flex-col justify-center">
                <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-1">Avg Client Rating</p>
                <div class="flex items-end justify-between">
                    <h2 class="text-2xl font-bold text-yellow-600" id="kpi-rating">0.0<span class="text-sm text-slate-400 font-normal">/10</span></h2>
                    <i class="fa-solid fa-star text-yellow-500 opacity-50 mb-1"></i>
                </div>
            </div>
        </div>

        <!-- Action Bar -->
        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100">
            <!-- Filters -->
            <div class="w-full sm:w-auto overflow-x-auto no-scrollbar flex space-x-2 pb-1 sm:pb-0">
                <button onclick="setFilter('All')" id="btn-filter-All" class="filter-btn active px-4 py-2 text-sm font-medium rounded-lg bg-alaya-900 text-white whitespace-nowrap transition-colors">All Files</button>
                <button onclick="setFilter('Pending Conditional')" id="btn-filter-Pending" class="filter-btn px-4 py-2 text-sm font-medium rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition-colors">Pending Conditional</button>
                <button onclick="setFilter('Formally Approved')" id="btn-filter-Approved" class="filter-btn px-4 py-2 text-sm font-medium rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition-colors">Formally Approved</button>
                <button onclick="setFilter('Pending Settlement')" id="btn-filter-PendingSettlement" class="filter-btn px-4 py-2 text-sm font-medium rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition-colors">Pending Settlement</button>
                <button onclick="setFilter('Settlement')" id="btn-filter-Settlement" class="filter-btn px-4 py-2 text-sm font-medium rounded-lg bg-slate-100 text-slate-600 hover:bg-slate-200 whitespace-nowrap transition-colors">Settlement</button>
            </div>
            
            <!-- Actions -->
            <div class="flex w-full sm:w-auto space-x-2 shrink-0">
                <button onclick="exportToCSV()" class="flex-1 sm:flex-none px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 text-sm font-medium rounded-lg transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-download"></i> Export CSV
                </button>
                <button onclick="openModal()" class="flex-1 sm:flex-none px-4 py-2 bg-alaya-600 hover:bg-alaya-500 text-white text-sm font-medium rounded-lg transition-colors shadow-sm flex items-center justify-center gap-2">
                    <i class="fa-solid fa-plus"></i> New File
                </button>
            </div>
        </div>

        <!-- Pipeline Grid -->
        <div id="pipeline-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here via JS -->
        </div>

    </main>

    <!-- Add/Edit File Modal -->
    <div id="file-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-200 overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="relative bg-white rounded-2xl text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:max-w-2xl w-full" onclick="event.stopPropagation()">
                <div class="bg-slate-50 px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                    <h3 class="text-lg leading-6 font-semibold text-slate-900" id="modal-title">Add New File</h3>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <form id="file-form" onsubmit="handleFormSubmit(event)" class="px-6 py-5">
                    <input type="hidden" id="file-id">
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 mb-5">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Client Opportunity Name *</label>
                                <input type="text" id="opp-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                            </div>
                            
                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Application Stage *</label>
                                <select id="app-stage" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm bg-white">
                                    <option value="Pending Conditional">Pending Conditional</option>
                                    <option value="Formally Approved">Formally Approved</option>
                                    <option value="Pending Settlement">Pending Settlement</option>
                                    <option value="Settlement">Settlement</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Credit Analyst (CA) *</label>
                                <select id="ca-name" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm bg-white">
                                    <option value="Silvia Sapkota">Silvia Sapkota</option>
                                    <option value="Rabin Rai">Rabin Rai</option>
                                    <option value="Gunjan Shree Thapa">Gunjan Shree Thapa</option>
                                    <option value="Other">Other (Assign Later)</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Client Rating (1-10)</label>
                                    <input type="number" id="client-rating" min="1" max="10" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Loan Amount ($)</label>
                                    <input type="number" id="loan-amount" min="0" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <div class="grid grid-cols-2 gap-3">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Lender</label>
                                    <input type="text" id="lender" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 mb-1">Broker</label>
                                    <input type="text" id="broker" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Submission Date</label>
                                <input type="date" id="sub-date" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Finance Due Date (FDD)</label>
                                <input type="date" id="fdd-date" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                            </div>

                            <div>
                                <label class="block text-sm font-medium text-slate-700 mb-1">Settlement Date</label>
                                <input type="date" id="settlement-date" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm">
                            </div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Latest Remarks / Action Taken</label>
                        <textarea id="remarks" rows="3" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-alaya-500 focus:border-alaya-500 outline-none transition-all text-sm"></textarea>
                    </div>

                    <div class="mt-6 flex justify-end space-x-3">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 text-sm font-medium rounded-lg transition-colors">Cancel</button>
                        <button type="submit" class="px-4 py-2 bg-alaya-600 hover:bg-alaya-500 text-white text-sm font-medium rounded-lg transition-colors shadow-sm flex items-center gap-2">
                            <i class="fa-solid fa-save"></i> Save File
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'short', day: 'numeric' };
        document.getElementById('currentDateDisplay').textContent = new Date().toLocaleDateString('en-US', dateOptions);

        let currentFilter = 'All';
        let files = JSON.parse(localStorage.getItem('alaya_kpi_files_live')) || [];

        // --- GOOGLE SHEETS API CONNECTION ---
        const GOOGLE_SCRIPT_URL = "https://script.google.com/a/macros/homeloanexperts.com.au/s/AKfycbzaac6IHlSpXQ6XbN2qtmVsUU9R6OYBGn2wMLmOVrWEC-E7G6h9_-vqWKZVdLSJHv8/exec";

        // Auto-fetch data on load
        function init() {
            renderCards();
            updateKPIs();
            fetchFromGoogleSheet(); // Background sync down from sheet
        }

        // PULL DATA FROM GOOGLE SHEETS
        function fetchFromGoogleSheet() {
            const syncText = document.getElementById('sync-text');
            const syncIcon = document.getElementById('sync-icon');
            
            syncText.textContent = "Syncing...";
            syncIcon.classList.add('fa-spin');

            fetch(GOOGLE_SCRIPT_URL)
                .then(response => response.json())
                .then(data => {
                    if (data && Array.isArray(data)) {
                        files = data; 
                        saveData();
                        renderCards();
                        
                        syncText.textContent = "Synced!";
                        setTimeout(() => syncText.textContent = "Sync Data", 2000);
                    } else if (data.error) {
                        console.error("Google Script Error: ", data.error);
                        syncText.textContent = "Error Syncing";
                    }
                })
                .catch(error => {
                    console.error("Error fetching data:", error);
                    syncText.textContent = "Offline Mode";
                })
                .finally(() => {
                    syncIcon.classList.remove('fa-spin');
                });
        }

        function saveData() {
            localStorage.setItem('alaya_kpi_files_live', JSON.stringify(files));
            updateKPIs();
        }

        function setFilter(stage) {
            currentFilter = stage;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-alaya-900', 'text-white');
                btn.classList.add('bg-slate-100', 'text-slate-600');
            });
            const activeBtnId = stage === 'All' ? 'btn-filter-All' : 'btn-filter-' + stage.replace(/\s+/g, '');
            const activeBtn = document.getElementById(activeBtnId);
            if(activeBtn) {
                activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
                activeBtn.classList.add('bg-alaya-900', 'text-white');
            }
            renderCards();
        }

        function getStageClassSuffix(stage) {
            if (!stage) return 'Pending';
            return stage.replace(/\s+/g, '');
        }

        function formatDate(dateStr) {
            if (!dateStr || String(dateStr).trim() === '') return '--';
            const date = new Date(dateStr);
            if (isNaN(date)) return dateStr; 
            return date.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        function formatCurrency(amount) {
            if (!amount) return '$0';
            const cleanAmount = String(amount).replace(/[^0-9.-]+/g,""); 
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0, maximumFractionDigits: 0 }).format(cleanAmount);
        }

        function updateKPIs() {
            const activeFiles = files.filter(f => f.stage !== 'Settlement');
            document.getElementById('kpi-active').textContent = activeFiles.length;

            const totalValue = activeFiles.reduce((sum, f) => {
                const cleanAmount = Number(String(f.amount).replace(/[^0-9.-]+/g,""));
                return sum + (isNaN(cleanAmount) ? 0 : cleanAmount);
            }, 0);
            document.getElementById('kpi-value').textContent = formatCurrency(totalValue);

            const settledFiles = files.filter(f => f.stage === 'Settlement');
            document.getElementById('kpi-settled').textContent = settledFiles.length;

            const ratedFiles = files.filter(f => Number(f.rating) > 0);
            let avgRating = 0;
            if (ratedFiles.length > 0) {
                const totalRating = ratedFiles.reduce((sum, f) => sum + Number(f.rating), 0);
                avgRating = (totalRating / ratedFiles.length).toFixed(1);
            }
            document.getElementById('kpi-rating').innerHTML = `${avgRating}<span class="text-sm text-slate-400 font-normal">/10</span>`;
        }

        function renderCards() {
            const container = document.getElementById('pipeline-container');
            container.innerHTML = '';

            const filteredFiles = currentFilter === 'All' ? files : files.filter(f => f.stage === currentFilter);

            filteredFiles.forEach(file => {
                let stageSuffix = getStageClassSuffix(file.stage);
                if(!['PendingConditional', 'FormallyApproved', 'PendingSettlement', 'Settlement'].includes(stageSuffix)) {
                    stageSuffix = 'Pending'; 
                }
                
                const cardHTML = `
                    <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow duration-200 border border-slate-100 overflow-hidden flex flex-col relative group">
                        <div class="absolute left-0 top-0 bottom-0 w-1 border-l-4 stage-border-${stageSuffix}"></div>
                        <div class="p-5 pb-3 border-b border-slate-50 flex justify-between items-start pl-6">
                            <div class="flex-1 pr-2">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wide stage-badge-${stageSuffix}">${file.stage || 'N/A'}</span>
                                </div>
                                <h3 class="font-bold text-lg text-slate-800 leading-tight">${file.oppName || 'Unnamed Opportunity'}</h3>
                                <p class="text-sm text-slate-500 mt-1 flex items-center gap-2">
                                    <i class="fa-solid fa-building-columns w-3 text-center"></i> ${file.lender || '--'} 
                                    <span class="text-slate-300">|</span> 
                                    <i class="fa-solid fa-user-tie w-3 text-center"></i> ${file.broker || '--'}
                                </p>
                            </div>
                            <div class="flex flex-col gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button onclick="editFile('${file.id}')" class="text-slate-400 hover:text-alaya-600 transition-colors" title="Edit File">
                                    <i class="fa-solid fa-pen-to-square"></i>
                                </button>
                                <button onclick="deleteFile('${file.id}')" class="text-slate-400 hover:text-red-500 transition-colors" title="Delete File (From Dashboard Only)">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        </div>

                        <div class="p-5 py-4 pl-6 flex-1 flex flex-col justify-between">
                            <div class="grid grid-cols-2 gap-y-3 gap-x-4 mb-4">
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Loan Amount</p>
                                    <p class="text-sm font-medium text-slate-700">${formatCurrency(file.amount)}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Assigned CA</p>
                                    <p class="text-sm font-medium text-slate-700 truncate" title="${file.ca}">${file.ca || '--'}</p>
                                </div>
                                <div>
                                    <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold">Important Date</p>
                                    <p class="text-sm font-medium text-slate-700">${file.stage === 'Settlement' || file.stage === 'Pending Settlement' ? 'Settlement: ' + formatDate(file.settlement) : 'FDD: ' + formatDate(file.fdd)}</p>
                                </div>
                            </div>
                            <div class="mt-2 bg-slate-50 p-3 rounded-lg border border-slate-100">
                                <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold mb-1 flex justify-between">
                                    <span>Latest Remarks</span>
                                    ${file.rating ? `<span class="text-yellow-600 font-bold"><i class="fa-solid fa-star"></i> ${file.rating}/10</span>` : ''}
                                </p>
                                <p class="text-sm text-slate-600 italic line-clamp-2" title="${file.remarks}">${file.remarks || '--'}</p>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        const modal = document.getElementById('file-modal');
        const form = document.getElementById('file-form');

        function openModal() {
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); }, 10);
        }

        function closeModal() {
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                form.reset();
                document.getElementById('file-id').value = '';
                document.getElementById('modal-title').textContent = 'Add New File';
            }, 200);
        }

        function editFile(id) {
            const file = files.find(f => f.id === id);
            if (!file) return;

            document.getElementById('modal-title').textContent = 'Edit File';
            document.getElementById('file-id').value = file.id;
            document.getElementById('opp-name').value = file.oppName;
            
            const stageDropdown = document.getElementById('app-stage');
            stageDropdown.value = file.stage;
            if(!stageDropdown.value) stageDropdown.value = 'Pending Conditional'; 
            
            const caDropdown = document.getElementById('ca-name');
            caDropdown.value = file.ca;
            if(!caDropdown.value) caDropdown.value = 'Other';

            document.getElementById('client-rating').value = file.rating || '';
            
            const cleanAmount = String(file.amount).replace(/[^0-9.-]+/g,"");
            document.getElementById('loan-amount').value = cleanAmount || '';
            
            document.getElementById('lender').value = file.lender || '';
            document.getElementById('broker').value = file.broker || '';
            
            const formatForInput = (rawDate) => {
                if(!rawDate) return '';
                const d = new Date(rawDate);
                if(isNaN(d)) return '';
                return d.toISOString().split('T')[0];
            };

            document.getElementById('sub-date').value = formatForInput(file.subDate);
            document.getElementById('fdd-date').value = formatForInput(file.fdd);
            document.getElementById('settlement-date').value = formatForInput(file.settlement);
            document.getElementById('remarks').value = file.remarks || '';

            openModal();
        }

        function deleteFile(id) {
            if(confirm('Are you sure you want to delete this file from the Dashboard? (Note: It will not delete it from your Google Sheet automatically).')) {
                files = files.filter(f => f.id !== id);
                saveData();
                renderCards();
            }
        }

        function handleFormSubmit(e) {
            e.preventDefault();

            const id = document.getElementById('file-id').value || Date.now().toString();
            const fileData = {
                id,
                oppName: document.getElementById('opp-name').value,
                stage: document.getElementById('app-stage').value,
                ca: document.getElementById('ca-name').value,
                rating: document.getElementById('client-rating').value,
                amount: document.getElementById('loan-amount').value,
                lender: document.getElementById('lender').value,
                broker: document.getElementById('broker').value,
                subDate: document.getElementById('sub-date').value,
                fdd: document.getElementById('fdd-date').value,
                settlement: document.getElementById('settlement-date').value,
                remarks: document.getElementById('remarks').value
            };

            const existingIndex = files.findIndex(f => f.id === id);
            if (existingIndex > -1) { files[existingIndex] = fileData; } else { files.unshift(fileData); }

            saveData();
            renderCards();
            closeModal();

            syncToGoogleSheet(fileData);
        }

        function exportToCSV() {
            if(files.length === 0) {
                alert("No files to export.");
                return;
            }

            const headers = ["ID", "Client Opportunity", "Application Stage", "Credit Analyst", "Lender", "Broker", "Loan Amount ($)", "Client Rating", "Submission Date", "Finance Due Date", "Settlement Date", "Latest Remarks"];
            let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n";

            files.forEach(f => {
                const escapeCSV = (str) => {
                    if (str == null) return '""';
                    const stringified = String(str).replace(/"/g, '""');
                    return `"${stringified}"`;
                };

                const row = [
                    escapeCSV(f.id), escapeCSV(f.oppName), escapeCSV(f.stage), escapeCSV(f.ca),
                    escapeCSV(f.lender), escapeCSV(f.broker), f.amount || 0,
                    f.rating || '', escapeCSV(f.subDate), escapeCSV(f.fdd),
                    escapeCSV(f.settlement), escapeCSV(f.remarks)
                ];
                csvContent += row.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Alaya_Pipeline_Export_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // PUSH DATA TO GOOGLE SHEETS
        function syncToGoogleSheet(data) {
            const formData = new URLSearchParams();
            formData.append('data', JSON.stringify(data));

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: formData
            }).then(() => {
                console.log("Data pushed successfully to Google Sheet!");
            }).catch(error => {
                console.error("Error syncing to Google Sheet:", error);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
